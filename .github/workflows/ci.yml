name: Go CI

on:

  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        
      - name:  Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          
      - name: install-dependencies
        run:  go mod tidy

      - name: Run-tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: checkout
        uses: actions/checkout@v4
        
      - name:  Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          
      - name: install-dependencies
        run:  go mod tidy

      - name: Check Quality
        run: go build -o app .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-api
          path: app

  docker:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: download-artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-api
        
      - run: ls -la